[theme]
base = "light"
primaryColor = "#e11d48"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f3f2"
textColor = "#1c1917"
font = "sans serif"

[server]
maxUploadSize = 15   # MB — cap uploads so a huge file can't OOM the machine
fileWatcherType = "none"

[client]
toolbarMode = "minimal"
